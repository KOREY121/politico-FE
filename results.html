<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoteSecure — Election Results</title>
<link rel="stylesheet" href="shared.css">
<style>
  .election-selector {
    display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 2rem;
  }
  .elec-pill {
    padding: 8px 20px; border-radius: 100px;
    font-family: 'DM Mono', monospace; font-size: .65rem;
    letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
    border: 1.5px solid var(--border); background: none; color: var(--muted);
    transition: all .2s;
  }
  .elec-pill.active { border-color: var(--gold); color: var(--ink); background: var(--gold-dim); font-weight: 600; }

  .results-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 2rem;
    align-items: start;
  }

  /* ── WINNER CARD ── */
  .winner-card {
    background: var(--ink); border-radius: 4px;
    padding: 2rem; margin-bottom: 1.5rem;
    position: relative; overflow: hidden;
    border-bottom: 3px solid var(--gold);
  }
  .winner-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 80% 20%, rgba(200,168,75,.12) 0%, transparent 60%);
  }
  .winner-label {
    font-family: 'DM Mono', monospace; font-size: .62rem;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 1rem;
    display: flex; align-items: center; gap: 8px;
  }
  .winner-label::before { content: '🏆'; }
  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem; color: var(--paper); letter-spacing: 2px; line-height: 1;
  }
  .winner-party {
    font-family: 'DM Mono', monospace; font-size: .7rem;
    color: rgba(245,243,238,.5); margin-top: 6px; letter-spacing: 1px;
  }
  .winner-pct {
    font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem;
    color: var(--gold); line-height: 1; margin-top: 1rem;
  }
  .winner-votes { font-family: 'DM Mono', monospace; font-size: .65rem; color: rgba(245,243,238,.4); }

  /* ── TURNOUT CARD ── */
  .turnout-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px; padding: 1.5rem; margin-bottom: 1.5rem;
  }
  .turnout-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
    letter-spacing: 2px; margin-bottom: 1rem;
  }
  .turnout-bar-wrap {
    height: 10px; background: var(--paper); border-radius: 5px; overflow: hidden; margin-bottom: 8px;
  }
  .turnout-bar {
    height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 5px; transition: width 1.2s ease;
    width: 0;
  }
  .turnout-nums {
    display: flex; justify-content: space-between;
    font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted);
  }
  .turnout-pct {
    font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--ink);
  }

  /* ── CONSTITUENCY BREAKDOWN ── */
  .breakdown-section { margin-top: 2rem; }
  .breakdown-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }
  .breakdown-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px; padding: 1.2rem;
  }
  .breakdown-card .bk-title {
    font-family: 'DM Mono', monospace; font-size: .65rem;
    letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
    margin-bottom: 1rem; display: flex; justify-content: space-between;
  }

  /* ── DONUT SVG ── */
  .donut-wrap {
    position: relative; width: 100px; height: 100px; margin: 0 auto 1rem;
  }
  .donut-wrap svg { transform: rotate(-90deg); }
  .donut-pct {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
    color: var(--ink);
  }

  /* Legend */
  .legend { display: flex; flex-direction: column; gap: .5rem; }
  .legend-item { display: flex; align-items: center; gap: 10px; font-size: .82rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  @media (max-width: 900px) {
    .results-layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Vote<span>Secure</span></a>
  <div class="nav-links" id="navLinks">
    <a href="results.html" class="active">Results</a>
  </div>
</nav>

<div class="page-wrap">

  <div class="page-header">
    <div class="page-header-left">
      <h1>Election Results</h1>
      <div class="sub">Live counts · Updated in real time</div>
    </div>
    <div id="liveIndicator" style="display:flex; align-items:center; gap:8px; font-family:'DM Mono',monospace; font-size:.65rem; color:var(--success);">
      <span class="dot-live"></span> LIVE
    </div>
  </div>

  <!-- ELECTION SELECTOR -->
  <div class="election-selector" id="electionSelector"></div>

  <!-- MAIN CONTENT -->
  <div id="resultsContent"></div>

</div>

<div id="toast"></div>
<script src="shared.js"></script>
<script>
  // Check session & set nav
  const session = getSession();
  const navLinks = document.getElementById('navLinks');
  if (session) {
    if (session.role === 'voter') {
      const db0 = getDB();
      const voter = db0.voters.find(v => v.id === session.id);
      navLinks.innerHTML = `
        <a href="vote.html">Cast Vote</a>
        <a href="results.html" class="active">Results</a>
        <span class="nav-user">${voter ? voter.fullName : ''}</span>
        <button class="nav-logout" onclick="clearSession();window.location.href='index.html'">Logout</button>`;
    } else if (session.role === 'admin') {
      navLinks.innerHTML = `
        <a href="admin.html">Admin</a>
        <a href="results.html" class="active">Results</a>
        <button class="nav-logout" onclick="clearSession();window.location.href='index.html'">Logout</button>`;
    }
  } else {
    navLinks.innerHTML = `<a href="index.html">Login</a><a href="results.html" class="active">Results</a>`;
  }

  const COLORS = ['#c8a84b','#2d7a4f','#2980b9','#8e44ad','#e67e22','#c0392b','#1abc9c'];

  let db, activeElectionId;

  function init() {
    db = getDB();
    renderSelector();
    // Default to first election
    if (db.elections.length) selectElection(db.elections[0].id);
  }

  function renderSelector() {
    const sel = document.getElementById('electionSelector');
    sel.innerHTML = db.elections.map(e =>
      `<button class="elec-pill" id="pill-${e.id}" onclick="selectElection(${e.id})">
        Election #${e.id} ${badgeHTML(e.status)}
      </button>`
    ).join('');
  }

  function selectElection(id) {
    activeElectionId = id;
    document.querySelectorAll('.elec-pill').forEach(p => p.classList.remove('active'));
    const pill = document.getElementById('pill-' + id);
    if (pill) pill.classList.add('active');
    renderResults(id);
  }

  function renderResults(elId) {
    const el = db.elections.find(e => e.id === elId);
    const candidates = db.candidates.filter(c => c.electionId === elId);
    const votes = db.votes.filter(v => v.electionId === elId);
    const total = votes.length;

    const ranked = candidates.map(c => ({
      ...c,
      count: votes.filter(v => v.candidateId === c.id).length
    })).sort((a, b) => b.count - a.count);

    const winner = ranked[0];
    const container = document.getElementById('resultsContent');

    if (!candidates.length) {
      container.innerHTML = `<div class="empty-state"><span class="icon">📋</span>No candidates registered for this election.</div>`;
      return;
    }

    // Build constituency breakdown
    const constIds = [...new Set(candidates.map(c => c.constituencyId))];
    const constBreakdowns = constIds.map(cid => {
      const con = db.constituencies.find(c => c.id === cid);
      const cands = ranked.filter(c => c.constituencyId === cid);
      const subTotal = cands.reduce((s, c) => s + c.count, 0);
      return { con, cands, subTotal };
    });

    container.innerHTML = `
      <div class="results-layout">

        <!-- LEFT: BARS & DETAILS -->
        <div>
          ${total === 0
            ? `<div style="background:var(--card); border:1px solid var(--border); border-radius:4px; padding:1.5rem; margin-bottom:1.5rem; font-family:'DM Mono',monospace; font-size:.72rem; color:var(--muted);">
                ⚡ No votes have been cast in this election yet. Results will appear here once voting begins.
               </div>`
            : (winner && winner.count > 0 ? `
          <div class="winner-card">
            <div class="winner-label">Current Leader</div>
            <div class="winner-name">${winner.fullName}</div>
            <div class="winner-party">${winner.party}</div>
            <div class="winner-pct">${Math.round(winner.count / total * 100)}%</div>
            <div class="winner-votes">${winner.count} of ${total} votes</div>
          </div>` : '')
          }

          <div class="section-title">All Candidates</div>
          ${ranked.map((c, i) => {
            const pct = total ? Math.round(c.count / total * 100) : 0;
            const isWinner = i === 0 && c.count > 0;
            const con = db.constituencies.find(co => co.id === c.constituencyId);
            return `
            <div class="result-row">
              <div class="result-top">
                <div>
                  <span class="result-name">${c.fullName}</span>
                  <span class="result-party">${c.party}</span>
                  ${isWinner && total > 0 ? ' 🏆' : ''}
                </div>
                <span class="result-pct">${pct}%</span>
              </div>
              <div class="result-bar-wrap">
                <div class="result-bar ${isWinner ? 'winner' : ''}" style="width:0" data-target="${pct}"></div>
              </div>
              <div class="result-votes">${c.count} vote${c.count !== 1 ? 's' : ''} · ${con ? con.name : '—'}</div>
            </div>`;
          }).join('')}

          ${constBreakdowns.length > 1 ? `
          <div class="breakdown-section">
            <div class="section-title">Constituency Breakdown</div>
            <div class="breakdown-grid">
              ${constBreakdowns.map(({ con, cands, subTotal }) => {
                const bkWinner = cands[0];
                return `
                <div class="breakdown-card">
                  <div class="bk-title">
                    <span>${con ? con.name : 'Unknown'}</span>
                    <span>${subTotal} votes</span>
                  </div>
                  ${cands.map(c => {
                    const p = subTotal ? Math.round(c.count / subTotal * 100) : 0;
                    return `
                    <div style="margin-bottom:.8rem;">
                      <div style="display:flex; justify-content:space-between; font-size:.78rem; margin-bottom:4px;">
                        <span>${c.fullName}</span>
                        <span style="font-family:'DM Mono',monospace; font-size:.68rem; color:var(--muted);">${p}%</span>
                      </div>
                      <div class="result-bar-wrap">
                        <div class="result-bar" style="width:${p}%"></div>
                      </div>
                    </div>`;
                  }).join('')}
                </div>`;
              }).join('')}
            </div>
          </div>` : ''}
        </div>

        <!-- RIGHT: SIDEBAR STATS -->
        <div>
          <div class="turnout-card">
            <div class="turnout-title">Voter Turnout</div>
            <div class="turnout-pct">${total > 0 ? Math.round(total / db.voters.filter(v=>v.status==='active').length * 100) : 0}%</div>
            <div class="turnout-bar-wrap"><div class="turnout-bar" data-target="${total > 0 ? Math.round(total / Math.max(db.voters.filter(v=>v.status==='active').length, 1) * 100) : 0}"></div></div>
            <div class="turnout-nums">
              <span>${total} voted</span>
              <span>${db.voters.filter(v=>v.status==='active').length} eligible</span>
            </div>
          </div>

          <div class="card" style="margin-bottom:1rem;">
            <div class="section-title" style="font-size:1rem;">Party Share</div>
            ${total === 0
              ? '<div style="font-family:\'DM Mono\',monospace; font-size:.65rem; color:var(--muted);">No votes yet</div>'
              : (() => {
                const parties = {};
                ranked.forEach(c => { parties[c.party] = (parties[c.party] || 0) + c.count; });
                const sortedParties = Object.entries(parties).sort((a,b) => b[1]-a[1]);
                const svgR = 40, cx = 50, cy = 50;
                let cumPct = 0;
                const arcs = sortedParties.map(([party, count], i) => {
                  const pct = count / total;
                  const start = cumPct * 2 * Math.PI;
                  const end = (cumPct + pct) * 2 * Math.PI;
                  cumPct += pct;
                  const x1 = cx + svgR * Math.sin(start), y1 = cy - svgR * Math.cos(start);
                  const x2 = cx + svgR * Math.sin(end),   y2 = cy - svgR * Math.cos(end);
                  const large = pct > .5 ? 1 : 0;
                  return `<path d="M${cx},${cy} L${x1},${y1} A${svgR},${svgR} 0 ${large},1 ${x2},${y2} Z"
                    fill="${COLORS[i % COLORS.length]}" stroke="#fff" stroke-width="1"/>`;
                });
                return `
                <div class="donut-wrap">
                  <svg viewBox="0 0 100 100" width="100" height="100">${arcs.join('')}
                    <circle cx="50" cy="50" r="22" fill="${'var(--card)'}"/>
                  </svg>
                  <div class="donut-pct">${total}</div>
                </div>
                <div class="legend">
                  ${sortedParties.map(([party, count], i) => `
                    <div class="legend-item">
                      <span class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></span>
                      <span>${party}</span>
                      <span style="margin-left:auto; font-family:'DM Mono',monospace; font-size:.65rem; color:var(--muted);">${Math.round(count/total*100)}%</span>
                    </div>`).join('')}
                </div>`;
              })()
            }
          </div>

          <div class="card">
            <div class="section-title" style="font-size:1rem;">Election Info</div>
            <div class="receipt-row" style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:.82rem;">
              <span style="color:var(--muted); font-family:'DM Mono',monospace; font-size:.62rem; text-transform:uppercase; letter-spacing:1px;">Status</span>
              <span>${badgeHTML(el.status)}</span>
            </div>
            <div class="receipt-row" style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:.82rem;">
              <span style="color:var(--muted); font-family:'DM Mono',monospace; font-size:.62rem; text-transform:uppercase; letter-spacing:1px;">Start</span>
              <span style="font-family:'DM Mono',monospace; font-size:.72rem;">${el.startDate}</span>
            </div>
            <div class="receipt-row" style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:.82rem;">
              <span style="color:var(--muted); font-family:'DM Mono',monospace; font-size:.62rem; text-transform:uppercase; letter-spacing:1px;">End</span>
              <span style="font-family:'DM Mono',monospace; font-size:.72rem;">${el.endDate}</span>
            </div>
            <div class="receipt-row" style="display:flex; justify-content:space-between; padding:6px 0; font-size:.82rem;">
              <span style="color:var(--muted); font-family:'DM Mono',monospace; font-size:.62rem; text-transform:uppercase; letter-spacing:1px;">Candidates</span>
              <span style="font-family:'DM Mono',monospace; font-size:.72rem;">${candidates.length}</span>
            </div>
          </div>
        </div>

      </div>`;

    // Animate bars
    requestAnimationFrame(() => {
      setTimeout(() => {
        document.querySelectorAll('.result-bar[data-target]').forEach(bar => {
          bar.style.width = bar.dataset.target + '%';
        });
        document.querySelectorAll('.turnout-bar[data-target]').forEach(bar => {
          bar.style.width = bar.dataset.target + '%';
        });
      }, 100);
    });
  }

  init();

  // Auto-refresh every 10 seconds
  setInterval(() => { db = getDB(); if (activeElectionId) renderResults(activeElectionId); }, 10000);
</script>
</body>
</html>
